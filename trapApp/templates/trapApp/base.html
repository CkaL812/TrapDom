{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrapDom — Streetwear{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script>window.FontAwesomeConfig = { autoReplaceSvg: 'nest' };</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" defer crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'trapApp/css/styles.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'charcoal-900': '#121212',
                        'charcoal-800': '#1E1E1E',
                        'charcoal-700': '#2A2A2A',
                        'off-white':    '#F5F5F0',
                        'grunge-gray':  '#C8C8C8',
                        'accent-red':   '#A0A0A0',
                    },
                    fontFamily: {
                        'gothic': ['"UnifrakturMaguntia"', 'cursive'],
                        'bebas':  ['"Bebas Neue"', 'cursive'],
                        'sans':   ['"Helvetica Neue"', 'Arial', 'sans-serif'],
                        'mono':   ['"Courier New"', 'monospace'],
                    },
                    spacing: { '128': '32rem' }
                }
            }
        }
    </script>
    {% block extra_css %}{% endblock %}
</head>

<body class="bg-charcoal-900 text-off-white min-h-screen">
<div class="grunge-texture fixed inset-0 z-0"></div>

{% include 'trapApp/partials/header.html' %}

{% block content %}{% endblock %}

{% include 'trapApp/partials/footer.html' %}

<!-- Кастомний модал підтвердження -->
<div id="trap-modal" class="fixed inset-0 z-[9999] hidden" aria-modal="true" role="dialog">
    <div id="trap-modal-bg" class="absolute inset-0 bg-black/75"></div>
    <div class="absolute inset-0 flex items-center justify-center px-6">
        <div id="trap-modal-box" class="relative bg-charcoal-900 border border-charcoal-700 w-full max-w-[380px]"
             style="animation: trapModalIn 0.18s ease;">
            <div class="border-b border-charcoal-700 px-6 py-4 flex items-center gap-3">
                <i class="fa-solid fa-triangle-exclamation text-[10px] text-grunge-gray"></i>
                <p class="text-[9px] font-mono uppercase tracking-[0.25em] text-grunge-gray">Підтвердження дії</p>
            </div>
            <div class="px-6 py-7">
                <p id="trap-modal-msg" class="font-mono text-sm text-off-white leading-relaxed"></p>
            </div>
            <div class="border-t border-charcoal-700 flex">
                <button id="trap-modal-no"
                        class="flex-1 border-r border-charcoal-700 px-4 py-4 font-mono text-[10px]
                               uppercase tracking-widest text-grunge-gray hover:bg-charcoal-800
                               hover:text-off-white transition-all">
                    Ні, залишити
                </button>
                <button id="trap-modal-yes"
                        class="flex-1 px-4 py-4 font-mono text-[10px] uppercase tracking-widest
                               font-bold text-red-400 hover:bg-red-950/30 hover:text-red-300 transition-all">
                    Так, підтвердити
                </button>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'trapApp/js/header.js' %}"></script>
<script>
function trapToggleWishlist(itemId, btn) {
    fetch('/wishlist/toggle/' + itemId + '/', {
        method: 'POST',
        headers: {'X-CSRFToken': '{{ csrf_token }}'},
    })
    .then(r => r.json())
    .then(data => {
        if (data.in_wishlist) {
            btn.classList.remove('text-grunge-gray', 'hover:text-red-400');
            btn.classList.add('text-red-500');
            btn.innerHTML = '<i class="fa-solid fa-heart text-sm"></i>';
        } else {
            btn.classList.remove('text-red-500');
            btn.classList.add('text-grunge-gray', 'hover:text-red-400');
            btn.innerHTML = '<i class="fa-regular fa-heart text-sm"></i>';
        }
        if (window.FontAwesome) FontAwesome.dom.i2svg({ node: btn });
    });
}
</script>
{% block extra_js %}{% endblock %}
<script>
(function () {
    var _pending = null;

    function _hide() {
        document.getElementById('trap-modal').classList.add('hidden');
        _pending = null;
    }

    document.getElementById('trap-modal-bg').addEventListener('click', _hide);
    document.getElementById('trap-modal-no').addEventListener('click', _hide);
    document.getElementById('trap-modal-yes').addEventListener('click', function () {
        var form = _pending;
        _hide();
        if (form) {
            form.dataset.confirmed = '1';
            form.submit();
        }
    });

    /* ESC закриває модал */
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') _hide();
    });

    /* Перехоплюємо всі форми з data-confirm */
    document.addEventListener('submit', function (e) {
        var form = e.target;
        var msg = form.dataset.confirm;
        if (msg && !form.dataset.confirmed) {
            e.preventDefault();
            _pending = form;
            document.getElementById('trap-modal-msg').textContent = msg;
            document.getElementById('trap-modal').classList.remove('hidden');
        }
    }, true);
})();
</script>
</body>
</html>
